#cloud-config
users:
  - name: devops
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMyHh+KoWPXxW1D20TEtrxZyd3P+tarPIbks0YKCO5Gv lab key

packages:
  - nginx
  - git

runcmd:
  - systemctl enable nginx
  - systemctl start nginx
  - echo "Welcome to your Terraform VM" > /home/devops/welcome.txt
